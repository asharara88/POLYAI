name: Monitoring scan

on:
  schedule:
    # Daily at 03:00 UTC. Edit to change cadence.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run scan
        run: node monitoring/scan.mjs

      - name: Open PR if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "monitoring: scheduled scan ${{ github.run_id }}"
          branch: monitoring/scan-${{ github.run_id }}
          delete-branch: true
          title: "Monitoring snapshot — ${{ github.run_id }}"
          body: |
            Scheduled monitoring scan from `monitoring/scan.mjs`.

            Review the new files under `clients/<slug>/knowledge/monitoring/`.
            Hand findings to `competitive-intel`, `voc`, or `research` for analysis.
          labels: |
            monitoring
            auto-generated
