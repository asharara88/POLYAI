name: Web CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".claude/agents/**"
      - "clients/**"
      - "verticals/**"
      - "schemas/**"
      - "knowledge/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".claude/agents/**"
      - "clients/**"
      - "verticals/**"
      - "schemas/**"
      - "knowledge/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx next build
        working-directory: web
